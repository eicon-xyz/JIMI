# HAJIMI_UI — PEP 8 / PageEyes Agent code style configuration
[tool.black]
line-length = 88
target-version = ['py312']

[tool.isort]
profile = "black"
line_length = 88

[tool.flake8]
max-line-length = 88
extend-ignore = ["E203", "W503"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
markers = [
    "e2e: E2E smoke tests that require a real browser (Chromium).",
    "real_llm: Tests that make real LLM API calls (needs API key in .env).",
]
